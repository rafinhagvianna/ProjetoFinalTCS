jpa:
  hibernate:
    ddl-auto: update # Isso fará o Hibernate criar as tabelas no H2
  show-sql: true
  properties:
    hibernate:
      # O Spring Boot detectará o dialeto do H2 automaticamente,
      # mas você pode ser explícito se quiser.
      dialect: org.hibernate.dialect.H2Dialect

h2:
  console:
    enabled: true
    path: /h2-console # Este será o endereço para acessar o console
