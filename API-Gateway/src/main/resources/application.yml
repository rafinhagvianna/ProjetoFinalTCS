server:
    port: 9000
spring:
    application:
        name: API-Gateway

cloud:
    gateway:
        # Habilita a busca de serviços via Eureka
        discovery:
            locator:
                enabled: true
                lower-case-service-id: true


        # Rotas explícitas (mais controle)
        routes:
            - id: catalogo-service-route
                # lb = Load Balancer. Roteia para o serviço com este nome no Eureka
              uri: lb://CATALOGO-SERVICE
              predicates:
                  # Qualquer requisiçăo para /catalogo/** será enviada para o serviço acima
                  - Path=/catalogo/**

            - id: agendamento-service-route
              uri: lb://AGENDAMENTO-SERVICE
              predicates:
                  - Path=/agendamentos/**

            - id: triagem-service-route
              uri: lb://TRIAGEM-SERVICE
              predicates:
                  - Path=/triagem/**

            - id: atendimento-service-route
              uri: lb://ATENDIMENTO-SERVICE
              predicates:
                  - Path=/atendimento/**

            - id: cadastro-cliente-service-route
              uri: lb://CADASTROCLIENTE-SERVICE
              predicates:
                  - Path=/clientes/**

            - id: cadastro-funcionario-service-route
              uri: lb://CADASTROFUNCIONARIO-SERVICE
              predicates:
                  - Path=/funcionarios/**

        # --- CONFIGURAÇĂO DE CORS PARA O FRONT-END ---
        globalcors:
            cors-configurations:
                '[/**]': # Aplica para todas as rotas
                    allowed-origins: "http://localhost:4200" # URL do seu front-end Angular
                    allowed-methods:
                        - GET
                        - POST
                        - PUT
                        - DELETE
                        - OPTIONS
                    allowed-headers: "*"

# --- CONFIGURAÇĂO DO EUREKA CLIENT ---
eureka:
    client:
        service-url:
            # Endereço do seu Eureka Server
            defaultZone: http://localhost:8761/eureka/
        # O Gateway precisa buscar o registro de serviços
        fetch-registry: true
        # É bom registrar o próprio Gateway no Eureka para monitoramento
        register-with-eureka: true

# --- SUAS CONFIGURAÇŐES DE SWAGGER (adaptadas para o novo roteamento) ---
springdoc:
    swagger-ui:
        path: /swagger-ui.html
        # Agora o Swagger-UI vai buscar as documentaçőes dos microsserviços através das rotas do Gateway
        urls:
            - name: Catalogo Service
              url: /catalogo/v3/api-docs
            - name: Agendamento Service
              url: /agendamentos/v3/api-docs
            - name: Triagem Service
              url: /triagem/v3/api-docs
            - name: Atendimento Service
              url: /atendimento/v3/api-docs
            - name: CadastroCliente Service
              url: /clientes/v3/api-docs
            - name: CadastroFuncionario Service
              url: /funcionarios/v3/api-docs

## Actuator Endpoints
#management.health.circuitbreakers.enabled=true
#management.endpoints.web.exposure.include=*
#management.endpoint.health.show-details=always
